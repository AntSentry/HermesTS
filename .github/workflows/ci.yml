name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    name: typecheck + test + 100% coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage (100% gate)
        run: bun run test

      - name: Upload coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage (html)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Build coverage comment body
        if: github.event_name == 'pull_request' && always()
        id: covbody
        run: |
          set -euo pipefail
          summary="coverage/coverage-summary.json"
          if [ ! -f "$summary" ]; then
            {
              echo "body<<EOF"
              echo "## Coverage summary"
              echo ""
              echo "_No coverage-summary.json produced — test run likely failed before coverage was written._"
              echo "EOF"
            } >>"$GITHUB_OUTPUT"
            exit 0
          fi
          node - <<'NODE' >coverage/_pr-comment.md
          const fs = require('fs');
          const s = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const t = s.total || {};
          const row = (k) => {
            const v = t[k] || { covered: 0, total: 0, pct: 0 };
            return `| ${k} | ${v.covered}/${v.total} | ${v.pct}% |`;
          };
          const out = [
            '## Coverage summary',
            '',
            '| Metric | Covered / Total | Pct |',
            '| --- | --- | --- |',
            row('lines'),
            row('statements'),
            row('functions'),
            row('branches'),
            '',
            '_Gate: 100% on lines, statements, functions, branches (see `vitest.config.ts`)._',
            '',
          ].join('\n');
          fs.writeFileSync('coverage/_pr-comment.md', out);
          NODE
          {
            echo "body<<EOF"
            cat coverage/_pr-comment.md
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-summary
          message: ${{ steps.covbody.outputs.body }}
